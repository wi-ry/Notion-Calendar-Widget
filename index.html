<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #app-shell {
      position: fixed;
      inset: 0;
      border-radius: 14px;
      overflow: hidden;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
    }

    #titlebar {
      height: 40px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      padding: 0 5px 0 15px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      user-select: none;
    }

    #title {
      color: #cccccc;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      flex: 1;
    }

    .btn {
      -webkit-app-region: no-drag;
      background: transparent;
      border: none;
      color: #cccccc;
      width: 32px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: background 0.1s, color 0.1s;
    }

    .btn:hover { background: #333; }
    #close-btn:hover { background: #f15550; color: #fff; }

    #calendar-wrap {
      position: relative;
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: #1a1a1a;
    }

    .resize-handle {
      position: fixed;
      z-index: 9999;
      -webkit-app-region: no-drag;
      pointer-events: auto;
    }

    .resize-top { top: 0; left: 8px; right: 8px; height: 8px; cursor: ns-resize; }
    .resize-right { top: 8px; right: 0; bottom: 8px; width: 8px; cursor: ew-resize; }
    .resize-bottom { left: 8px; right: 8px; bottom: 0; height: 8px; cursor: ns-resize; }
    .resize-left { top: 8px; left: 0; bottom: 8px; width: 8px; cursor: ew-resize; }

    .resize-top-left { top: 0; left: 0; width: 10px; height: 10px; cursor: nwse-resize; }
    .resize-top-right { top: 0; right: 0; width: 10px; height: 10px; cursor: nesw-resize; }
    .resize-bottom-right { right: 0; bottom: 0; width: 10px; height: 10px; cursor: nwse-resize; }
    .resize-bottom-left { left: 0; bottom: 0; width: 10px; height: 10px; cursor: nesw-resize; }
  </style>
</head>
<body>
  <div class="resize-handle resize-top" data-edge="top"></div>
  <div class="resize-handle resize-right" data-edge="right"></div>
  <div class="resize-handle resize-bottom" data-edge="bottom"></div>
  <div class="resize-handle resize-left" data-edge="left"></div>

  <div class="resize-handle resize-top-left" data-edge="top-left"></div>
  <div class="resize-handle resize-top-right" data-edge="top-right"></div>
  <div class="resize-handle resize-bottom-right" data-edge="bottom-right"></div>
  <div class="resize-handle resize-bottom-left" data-edge="bottom-left"></div>

  <div id="app-shell">
    <div id="titlebar">
      <span id="title">Notion Calendar</span>
      <button class="btn" id="refresh-btn" title="Refresh">↺</button>
      <button class="btn" id="close-btn" title="Close">✕</button>
    </div>
    <div id="calendar-wrap"></div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
