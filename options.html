<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Widget Options</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #d6d6d6;
      padding: 18px;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 600;
    }

    .section {
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      padding: 14px;
      background: #202020;
    }

    label {
      display: flex;
      gap: 10px;
      align-items: center;
      line-height: 1.3;
      cursor: pointer;
      user-select: none;
    }

    input[type='checkbox'] {
      width: 17px;
      height: 17px;
      accent-color: #4f9dff;
      cursor: pointer;
    }

    .hint {
      margin-top: 8px;
      margin-left: 27px;
      color: #9a9a9a;
      font-size: 12px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      border: 1px solid #3a3a3a;
      background: #2a2a2a;
      color: #d6d6d6;
      border-radius: 6px;
      min-width: 98px;
      height: 32px;
      cursor: pointer;
    }

    button:hover {
      background: #353535;
    }

    #save-btn {
      background: #1f5bbf;
      border-color: #1f5bbf;
      color: #fff;
    }

    #save-btn:hover {
      background: #2a6fdc;
    }

    #status {
      min-height: 18px;
      margin-top: 10px;
      color: #9ad39f;
      font-size: 12px;
      text-align: right;
    }
  </style>
</head>
<body>
  <h1>Widget Options</h1>

  <div class="section">
    <label for="remember-bounds">
      <input type="checkbox" id="remember-bounds">
      Save window location and size on close
    </label>
    <div class="hint">If disabled, the widget starts at the default size and position each launch.</div>
  </div>

  <div class="actions">
    <button id="reset-btn" type="button">Reset Options</button>
    <button id="cancel-btn" type="button">Cancel</button>
    <button id="save-btn" type="button">Save</button>
  </div>

  <div id="status"></div>

  <script src="optionsRenderer.js"></script>
</body>
</html>
